<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audífonos Premium</title>
<meta name="description" content="Audífonos inalámbricos premium con entrega GRATIS en Ambato. AirPods Pro 2, Pro 3 y Max a precios increíbles.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">

<style>
* {
  box-sizing: border-box;
  scroll-behavior: smooth;
}

:root {
  --primary: #0066ff;
  --primary-dark: #0052cc;
  --success: #00ff88;
  --danger: #ff4444;
  --bg-dark: #111;
  --bg-darker: #1a1a1a;
  --border: #333;
  --text: #fff;
  --shadow: 0 10px 30px rgba(0,102,255,0.3);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
  background: #000;
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px;
}

section { 
  padding: 80px 0; 
  text-align: center; 
}

.hero {
  position: relative;
  height: clamp(70vh, 85vw, 90vh);
  min-height: 550px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,102,255,0.2) 100%);
  z-index: -1;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 900px;
  padding: 0 20px;
}

.hero h1 {
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 800;
  margin: 0 0 1.2rem 0;
  text-shadow: 0 4px 12px rgba(0,0,0,0.8);
  letter-spacing: -0.02em;
}

.hero-subtitle {
  font-size: clamp(1.2rem, 3.5vw, 1.6rem);
  margin: 0 0 1.5rem 0;
  opacity: 0.95;
  font-weight: 300;
}

.hero h2 {
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  margin: 2rem 0 3rem 0;
  background: linear-gradient(135deg, var(--primary), #00ccff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700;
}

.cta-button, .btn {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: clamp(16px, 3vw, 20px) clamp(35px, 5vw, 45px);
  border-radius: 50px;
  border: none;
  cursor: pointer;
  margin: 10px;
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  font-weight: 600;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--shadow);
  text-decoration: none;
  display: inline-block;
  position: relative;
  overflow: hidden;
}

.cta-button::before, .btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.5s;
}

.cta-button:hover::before, .btn:hover::before {
  left: 100%;
}

.cta-button:hover, .btn:hover {
  background: linear-gradient(135deg, var(--primary-dark), #0040b3);
  transform: translateY(-4px);
  box-shadow: 0 20px 40px rgba(0,102,255,0.5);
}

.section-title {
  font-size: clamp(2.2rem, 6vw, 3.5rem);
  margin-bottom: 3rem;
  font-weight: 700;
  position: relative;
}

.section-title::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), #00ccff);
  border-radius: 2px;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 35px;
  padding: 0 10px;
}

.product-card {
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 35px 30px;
  background: linear-gradient(145deg, var(--bg-darker), var(--bg-dark));
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.product-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--primary), #00ccff, var(--primary));
  transform: scaleX(0);
  transition: transform 0.3s ease;
}

.product-card:hover::before {
  transform: scaleX(1);
}

.product-card:hover {
  transform: translateY(-15px) scale(1.02);
  box-shadow: 0 30px 60px rgba(0,102,255,0.4);
  border-color: var(--primary);
}

.product-image {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 18px;
  margin-bottom: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.product-card h3 {
  font-size: clamp(1.4rem, 3vw, 1.8rem);
  margin: 0 0 15px 0;
  color: var(--text);
  font-weight: 700;
}

.product-price {
  font-size: clamp(1.8rem, 4vw, 2.4rem);
  font-weight: 800;
  color: var(--success);
  margin: 0 0 25px 0;
  text-shadow: 0 2px 8px rgba(0,255,136,0.3);
}

.benefits {
  background: linear-gradient(135deg, #f8f9ff 0%, #e8ecff 100%);
  color: #1a1a1a;
}

.benefits h2 {
  color: var(--primary);
}

.benefits p {
  font-size: clamp(1.2rem, 3vw, 1.5rem);
  margin: 1rem 0;
  font-weight: 400;
  opacity: 0.9;
}

.free-shipping {
  background: #000 !important;
  color: var(--text) !important;
}

.free-shipping h2 {
  color: var(--success);
  text-shadow: 0 0 20px rgba(0,255,136,0.5);
}

.cart-icon {
  position: fixed;
  top: 30px;
  right: 30px;
  background: linear-gradient(145deg, var(--primary), var(--primary-dark));
  padding: 20px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10000;
  box-shadow: 0 15px 40px rgba(0,102,255,0.6);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-size: 1.6rem;
  backdrop-filter: blur(20px);
  border: 2px solid rgba(255,255,255,0.1);
}

.cart-icon:hover {
  transform: scale(1.15) rotate(5deg);
  box-shadow: 0 25px 60px rgba(0,102,255,0.8);
}

.cart-count {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--danger);
  color: white;
  font-size: 0.85rem;
  font-weight: 800;
  padding: 6px 10px;
  border-radius: 50%;
  min-width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(255,68,68,0.6);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  backdrop-filter: blur(15px);
  justify-content: center;
  align-items: center;
  z-index: 20000;
  padding: 30px;
  animation: modalSlide 0.3s ease;
}

@keyframes modalSlide {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.modal-content {
  background: linear-gradient(145deg, var(--bg-darker), var(--bg-dark));
  padding: 50px 40px;
  border-radius: 30px;
  max-width: 600px;
  width: 95%;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  box-shadow: 0 40px 80px rgba(0,0,0,0.9);
  position: relative;
}

.modal-content h3 {
  margin: 0 0 30px 0;
  color: var(--primary);
  font-size: clamp(1.6rem, 4vw, 2.2rem);
}

.cart-item {
  margin: 20px 0;
  padding: 20px;
  background: rgba(34,34,34,0.8);
  border-radius: 16px;
  border-left: 5px solid var(--primary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.3s ease;
}

.cart-item:hover {
  background: rgba(51,51,51,0.9);
  transform: translateX(5px);
}

.cart-item button {
  background: var(--danger);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
}

.total-row {
  font-size: 2.2rem !important;
  color: var(--success) !important;
  font-weight: 800 !important;
  margin: 30px 0 !important;
  text-shadow: 0 0 20px rgba(0,255,136,0.5);
}

#descText ul {
  text-align: left;
  padding-left: 30px;
  margin: 25px 0;
}

#descText li {
  margin-bottom: 15px;
  font-size: 1.15rem;
  position: relative;
  padding-left: 10px;
}

#descText li::marker {
  color: var(--primary);
  font-size: 1.3em;
}

footer {
  padding: 50px 0 30px;
  background: #000;
  text-align: center;
  border-top: 1px solid var(--border);
}

footer p {
  margin: 0;
  font-size: 1.15rem;
  opacity: 0.85;
  font-weight: 400;
}

/* RESPONSIVE */
@media (max-width: 1024px) {
  .products-grid {
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
  }
}

@media (max-width: 768px) {
  .hero {
    height: 75vh;
  }
  
  section {
    padding: 60px 0;
  }
  
  .products-grid {
    grid-template-columns: 1fr;
    gap: 30px;
  }
  
  .product-card {
    padding: 30px 25px;
  }
  
  .modal-content {
    padding: 40px 30px;
    margin: 20px;
  }
  
  .cart-icon {
    top: 25px;
    right: 25px;
    padding: 18px;
  }
}

@media (max-width: 480px) {
  .container {
    padding: 0 15px;
  }
  
  .hero-content {
    padding: 0 15px;
  }
  
  .cta-button, .btn {
    padding: 15px 30px;
    display: block;
    margin: 10px auto;
    max-width: 280px;
  }
  
  .product-image {
    height: 200px;
  }
  
  .cart-item {
    flex-direction: column;
    align-items: flex-start;
    gap: 15px;
  }
}

/* ANIMACIONES */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.product-card {
  opacity: 0;
  animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.product-card:nth-child(1) { animation-delay: 0.1s; }
.product-card:nth-child(2) { animation-delay: 0.2s; }
.product-card:nth-child(3) { animation-delay: 0.3s; }

.fade-in {
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.8s ease;
}

.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>
